<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minecraft Básico en 3D</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
let scene, camera, renderer;
let controls;

init();
animate();

function init() {
  // Escena
  scene = new THREE.Scene();

  // Cámara
  camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(10, 10, 10);
  camera.lookAt(0,0,0);

  // Renderizador
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // Luces
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambientLight);
  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(50, 50, 50);
  scene.add(directionalLight);

  // Crear bloques (cubo estilo Minecraft)
  const geometry = new THREE.BoxGeometry(1,1,1);
  const material = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
  for(let x=0; x<10; x++) {
    for(let z=0; z<10; z++) {
      const cube = new THREE.Mesh(geometry, material);
      cube.position.set(x, 0, z);
      scene.add(cube);
    }
  }

  // Crear suelo
  const floorGeo = new THREE.PlaneGeometry(20,20);
  const floorMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.position.y = -0.5;
  scene.add(floor);

  // Control de cámara con mouse + teclado
  document.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onWindowResize);
}

function onWindowResize() {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

const moveSpeed = 0.2;
const keysPressed = {};
function onKeyDown(e) {
  keysPressed[e.key] = true;
}
document.addEventListener('keyup', e => {
  keysPressed[e.key] = false;
});

function animate() {
  requestAnimationFrame(animate);

  // Movimiento cámara con WASD
  if(keysPressed['w']) {
    camera.position.x -= moveSpeed * Math.sin(camera.rotation.y);
    camera.position.z -= moveSpeed * Math.cos(camera.rotation.y);
  }
  if(keysPressed['s']) {
    camera.position.x += moveSpeed * Math.sin(camera.rotation.y);
    camera.position.z += moveSpeed * Math.cos(camera.rotation.y);
  }
  if(keysPressed['a']) {
    camera.position.x -= moveSpeed * Math.cos(camera.rotation.y);
    camera.position.z += moveSpeed * Math.sin(camera.rotation.y);
  }
  if(keysPressed['d']) {
    camera.position.x += moveSpeed * Math.cos(camera.rotation.y);
    camera.position.z -= moveSpeed * Math.sin(camera.rotation.y);
  }

  renderer.render(scene, camera);
}
</script>
</body>
</html>
