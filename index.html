<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración de Sensibilidad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #e60000;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #e60000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #cc0000;
        }
        .resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #ffe6e6;
            border: 1px solid #e60000;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Configuración de Sensibilidad de tu Celular</h2>
        <form id="sensibilidadForm">
            <label for="marca">Marca:</label>
            <input type="text" id="marca" name="marca" placeholder="Ejemplo: Samsung">

            <label for="modelo">Modelo:</label>
            <input type="text" id="modelo" name="modelo" placeholder="Ejemplo: Galaxy S21">

            <label for="sensibilidad_general">Sensibilidad General:</label>
            <input type="text" id="sensibilidad_general" name="sensibilidad_general" placeholder="Valor">

            <label for="sensibilidad_rojo">Sensibilidad de Punto Rojo:</label>
            <input type="text" id="sensibilidad_rojo" name="sensibilidad_rojo" placeholder="Valor">

            <label for="sensibilidad_mira_x2">Sensibilidad Mira X2:</label>
            <input type="text" id="sensibilidad_mira_x2" name="sensibilidad_mira_x2" placeholder="Valor">

            <label for="sensibilidad_mira_x4">Sensibilidad Mira X4:</label>
            <input type="text" id="sensibilidad_mira_x4" name="sensibilidad_mira_x4" placeholder="Valor">

            <label for="tamaño_boton">Tamaño del Botón:</label>
            <input type="text" id="tamaño_boton" name="tamaño_boton" placeholder="Valor">

            <label for="precisión">Precisión:</label>
            <input type="text" id="precisión" name="precisión" placeholder="Valor">

            <button type="button" onclick="mostrarResultado()">Generar Sensibilidad</button>
        </form>
        <div class="resultado" id="resultado"></div>
    </div>

    <script>
        function mostrarResultado() {
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;
            const sensibilidadGeneral = document.getElementById('sensibilidad_general').value;
            const sensibilidadRojo = document.getElementById('sensibilidad_rojo').value;
            const sensibilidadMiraX2 = document.getElementById('sensibilidad_mira_x2').value;
            const sensibilidadMiraX4 = document.getElementById('sensibilidad_mira_x4').value;
            const tamañoBoton = document.getElementById('tamaño_boton').value;
            const precision = document.getElementById('precisión').value;

            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerHTML = `
                <h3>Configuración para ${marca} ${modelo}</h3>
                <p>Sensibilidad General: ${sensibilidadGeneral}</p>
                <p>Sensibilidad de Punto Rojo: ${sensibilidadRojo}</p>
                <p>Sensibilidad Mira X2: ${sensibilidadMiraX2}</p>
                <p>Sensibilidad Mira X4: ${sensibilidadMiraX4}</p>
                <p>Tamaño del Botón: ${tamañoBoton}</p>
                <p>Precisión: ${precision}</p>
            `;
        }
    </script>
</body>
</html>
