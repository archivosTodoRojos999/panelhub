<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Generador de Sensibilidad</title>

<style>

body{
background:black;
color:#00ff88;
font-family:monospace;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
border:2px solid #00ff88;
padding:30px;
width:350px;
box-shadow:0 0 20px #00ff88;
}

button{
background:black;
color:#00ff88;
border:1px solid #00ff88;
padding:10px;
cursor:pointer;
margin-top:10px;
width:100%;
}

select{
width:100%;
margin-top:10px;
background:black;
color:#00ff88;
border:1px solid #00ff88;
padding:8px;
}

.result{
margin-top:20px;
}

</style>
</head>

<body>

<div class="box">

<h2>⚡ Sensitivity Generator</h2>

<label>Dispositivo</label>
<select id="device">
<option>Android</option>
<option>iPhone</option>
<option>PC</option>
</select>

<label>Estilo</label>
<select id="style">
<option>Precisión</option>
<option>Equilibrado</option>
<option>Rápido</option>
</select>

<button onclick="generar()">GENERAR</button>

<div class="result" id="result"></div>

</div>

<script>

function random(min,max){
return Math.floor(Math.random()*(max-min)+min)
}

function generar(){

let device = document.getElementById("device").value
let style = document.getElementById("style").value

let general, redDot, scope, sniper

if(style=="Precisión"){
general=random(60,80)
redDot=random(50,70)
scope=random(40,60)
sniper=random(30,50)
}

if(style=="Equilibrado"){
general=random(80,100)
redDot=random(70,90)
scope=random(60,80)
sniper=random(50,70)
}

if(style=="Rápido"){
general=random(100,120)
redDot=random(90,110)
scope=random(80,100)
sniper=random(70,90)
}

document.getElementById("result").innerHTML=

`
Dispositivo: ${device}<br><br>

General: ${general}<br>
Red Dot: ${redDot}<br>
2x Scope: ${scope}<br>
Sniper: ${sniper}

`

}

</script>

</body>
</html>
