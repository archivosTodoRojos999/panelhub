<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sobrevivir a la Escuela Marcelino Blanco</title>

<style>

html,body{
height:100%;
overflow:hidden;
}

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

h1{
padding:10px;
font-size:34px;
}

#video{
width:900px;
max-width:90%;
position:relative;
}

#imagen{
width:100%;
height:450px;
object-fit:cover;
border-radius:12px;
transition:opacity 1s;
}

/* SUBTITULO */

#subtitulo{
position:absolute;
bottom:20px;
left:0;
right:0;
font-size:22px;
background:rgba(0,0,0,0.6);
padding:12px;
border-radius:8px;
}

/* LOGO FIJO */

#logoEscuela{
position:absolute;
top:10px;
left:10px;
display:flex;
align-items:center;
gap:10px;
background:rgba(0,0,0,0.6);
padding:6px 12px;
border-radius:12px;
z-index:10;
}

#logoEscuela img{
width:55px;
height:55px;
object-fit:contain;
background:white;
padding:3px;
border-radius:50%;
}

#logoEscuela span{
font-weight:bold;
}

/* BOTON */

button{
margin-top:20px;
padding:14px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#00c3ff,#4facfe);
cursor:pointer;
color:white;
font-weight:bold;
}

</style>
</head>

<body>

<h1>¡Sobrevivir a la Escuela Marcelino Blanco!</h1>

<div id="video">

<!-- LOGO (NO CAMBIA) -->
<div id="logoEscuela">
<img src="logo-marcelino.png">
<span>Marcelino Blanco</span>
</div>

<!-- IMAGEN DEL VIDEO -->
<img id="imagen" src="https://images.unsplash.com/photo-1580582932707-520aed937b7b">

<div id="subtitulo">
Presiona iniciar para comenzar
</div>

</div>

<button onclick="iniciar()">▶ Iniciar</button>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

let imagenes=[
"https://images.unsplash.com/photo-1580582932707-520aed937b7b",
"https://images.unsplash.com/photo-1596495578065-6e0763fa1178",
"https://images.unsplash.com/photo-1503676260728-1c00da094a0b",
"https://images.unsplash.com/photo-1509062522246-3755977927d7",
"https://images.unsplash.com/photo-1523240795612-9a054b0db644",
"https://images.unsplash.com/photo-1577896851231-70ef18881754"
];

let textos=[

"Hola chicos, bienvenidos a la escuela Marcelino Blanco. Soy Luciano Sala y estoy aquí para ayudarlos a comenzar este nuevo año.",

"La escuela es como un juego. Tendrán desafíos, harán amigos y aprenderán muchas cosas nuevas.",

"No se preocupen si al principio no saben todo. Eso es parte de estar en primer año.",

"Algunos consejos para sobrevivir: no tengan miedo de preguntar, hagan amigos y trabajen en equipo.",

"Recuerden que la escuela es un lugar para aprender, crecer y divertirse.",

"Buena suerte chicos. Vamos a hacer que este año sea inolvidable."

];

let i=0;

/* INICIAR */

function iniciar(){

let musica=document.getElementById("musica");
musica.volume=0.25;
musica.play();

reproducirEscena();

}

/* ESCENA */

function reproducirEscena(){

if(i>=textos.length) return;

let img=document.getElementById("imagen");
let subt=document.getElementById("subtitulo");

img.style.opacity=0;

setTimeout(()=>{

img.src=imagenes[i];   // SOLO cambia esta imagen
subt.innerText=textos[i];

img.style.opacity=1;

leerTexto(textos[i]);

},500);

}

/* VOZ */

function leerTexto(texto){

speechSynthesis.cancel();

let voz=new SpeechSynthesisUtterance(texto);

voz.lang="es-ES";
voz.rate=0.95;
voz.pitch=0.5;

voz.onend=function(){

i++;

setTimeout(reproducirEscena,500);

};

speechSynthesis.speak(voz);

}

</script>

</body>
</html>
