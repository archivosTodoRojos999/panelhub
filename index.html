<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SENCI SALITA</title>

<style>
body{
margin:0;
background:black;
font-family:monospace;
color:#00f0ff;
overflow:hidden;
}

/* CONTENEDOR */
.container{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
gap:20px;
}

/* PANEL */
.panel{
padding:20px;
width:300px;
background:black;
border-radius:15px;
animation:led 3s linear infinite;
}

/* LED BORDE */
@keyframes led{
0%{box-shadow:0 0 10px blue;}
25%{box-shadow:0 0 10px cyan;}
50%{box-shadow:0 0 10px purple;}
75%{box-shadow:0 0 10px pink;}
100%{box-shadow:0 0 10px blue;}
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
background:black;
border:1px solid #00f0ff;
color:#00f0ff;
border-radius:5px;
}

/* BOTONES */
.btn{
width:100%;
padding:10px;
margin-top:10px;
background:black;
border:1px solid #00f0ff;
color:#00f0ff;
cursor:pointer;
border-radius:5px;
transition:0.3s;
}

.btn:active{
background:#00f0ff;
color:black;
}

/* OPCIONES */
.opciones{
display:flex;
gap:5px;
margin-top:10px;
}

.opciones button{
flex:1;
}

/* RESULTADO */
.resultado{
width:300px;
padding:20px;
background:black;
border-radius:15px;
animation:led 3s linear infinite;
}

/* VIP BOTÓN */
.vip-btn{
position:absolute;
right:10px;
top:10px;
width:50px;
height:50px;
border-radius:50%;
background:gold;
animation:rainbow 2s infinite;
border:none;
cursor:pointer;
}

@keyframes rainbow{
0%{background:red;}
25%{background:yellow;}
50%{background:green;}
75%{background:blue;}
100%{background:red;}
}

/* PUNTITOS */
.particles{
position:absolute;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
}

.dot{
position:absolute;
width:3px;
height:3px;
background:#00f0ff;
animation:move 5s linear infinite;
}

@keyframes move{
from{transform:translateY(0);}
to{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<button class="vip-btn" onclick="abrirVIP()">VIP</button>

<div class="particles" id="particles"></div>

<div class="container">

<!-- PANEL PRINCIPAL -->
<div class="panel">

<h2>SENCI SALITA</h2>

<input id="marca" placeholder="Marca del dispositivo">
<input id="modelo" placeholder="Modelo del dispositivo">

<div class="opciones">
<button class="btn" onclick="setModo('ALTA')">ALTA</button>
<button class="btn" onclick="setModo('MEDIA')">MEDIA</button>
<button class="btn" onclick="setModo('BAJA')">BAJA</button>
</div>

<button class="btn" onclick="generar()">GENERAR SENCI</button>

</div>

<!-- RESULTADO AL LADO -->
<div class="resultado" id="resultado">
<h3>RESULTADO</h3>
<p id="res"></p>
</div>

</div>

<script>
let modo="MEDIA";

/* MODO */
function setModo(m){
modo=m;
}

/* GENERAR */
function generar(){

let marca=document.getElementById("marca").value;
let modelo=document.getElementById("modelo").value;

if(!marca || !modelo){
alert("Completa los datos");
return;
}

/* BASE REAL */
let base=0;
let texto=marca+modelo;

for(let i=0;i<texto.length;i++){
base+=texto.charCodeAt(i);
}

base=base%50;

/* SENSI BASE */
let sens={
general:150+base,
red:130+base,
x2:120+base,
x4:110+base,
franco:125+base,
boton:50+base
};

/* AJUSTE POR MODO */
if(modo==="ALTA"){
sens.general+=20;
sens.red+=25;
}
if(modo==="BAJA"){
sens.general-=15;
sens.red-=10;
}

/* DRAG PRO */
sens.red+=10;

/* LIMITES */
function ajustar(v,min,max){
return Math.max(min,Math.min(v,max));
}

sens.general=ajustar(sens.general,1,200);
sens.red=ajustar(sens.red,1,200);
sens.x2=ajustar(sens.x2,1,200);
sens.x4=ajustar(sens.x4,1,200);
sens.franco=ajustar(sens.franco,1,200);
sens.boton=ajustar(sens.boton,1,100);

/* MOSTRAR */
document.getElementById("res").innerHTML=`
GENERAL: ${sens.general}<br>
MIRA DE PUNTO ROJO: ${sens.red}<br>
MIRA X2: ${sens.x2}<br>
MIRA X4: ${sens.x4}<br>
MIRA FRANCOTIRADOR: ${sens.franco}<br>
BOTÓN DE CAMARA 360*: ${sens.boton}
`;

}

/* VIP */
function abrirVIP(){
let clave=prompt("Clave VIP:");
if(clave=="22"){
document.body.innerHTML=`
<div style="display:flex;justify-content:center;align-items:center;height:100vh;background:black;color:red;font-size:20px;">
🔥 SENCI PROHIBIDA ACTIVADA 🔥
</div>
`;
}else{
alert("Clave incorrecta");
}
}

/* PARTÍCULAS */
for(let i=0;i<40;i++){
let d=document.createElement("div");
d.className="dot";
d.style.left=Math.random()*100+"%";
d.style.top=Math.random()*100+"%";
d.style.animationDuration=(3+Math.random()*5)+"s";
document.getElementById("particles").appendChild(d);
}
</script>

</body>
</html>
