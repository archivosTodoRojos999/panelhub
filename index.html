<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Senci de Salita</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: #a855f7;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: black;
}

/* fondo animado */
#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

/* caja */
.box {
  border: 2px solid #a855f7;
  padding: 20px;
  width: 300px;
  text-align: center;
  background: rgba(0,0,0,0.6);
  box-shadow: 0 0 10px #a855f7, 0 0 30px #9333ea, 0 0 60px #7e22ce;
}

/* input */
input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: black;
  color: #a855f7;
  border: 1px solid #a855f7;
}

/* botón */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: 1px solid #a855f7;
  background: black;
  color: #a855f7;
  cursor: pointer;
}

button:hover {
  background: #a855f7;
  color: black;
}
</style>

</head>
<body>

<canvas id="bg"></canvas>

<div class="box">
  <h2>🎯 SENCI DE SALITA</h2>

  <input id="device" placeholder="Ej: Samsung A51, iPhone 11">
  <button id="btn">GENERAR SENCI</button>

  <p id="error" style="color:red;"></p>

  <div id="sens"></div>
  <div id="headshot"></div>
</div>

<script>
/* BOTÓN */
document.getElementById("btn").addEventListener("click", function() {

  const device = document.getElementById("device").value;
  const error = document.getElementById("error");
  const sensDiv = document.getElementById("sens");
  const headshotDiv = document.getElementById("headshot");

  if (!device.trim()) {
    error.textContent = "Escribe tu dispositivo";
    sensDiv.innerHTML = "";
    headshotDiv.innerHTML = "";
    return;
  }

  error.textContent = "";

  let hash = 0;
  for (let i = 0; i < device.length; i++) {
    hash = device.charCodeAt(i) + ((hash << 5) - hash);
  }

  const base = Math.abs(hash);

  function calc(min, max, factor) {
    let value = min + (base % factor);
    if (value < min) value = min;
    if (value > max) value = max;
    return value;
  }

  const sens = {
    general: calc(120, 200, 80),
    redDot: calc(90, 180, 70),
    x2: calc(80, 170, 60),
    x4: calc(70, 160, 50),
    sniper: calc(60, 150, 40),
    freeLook: calc(100, 200, 100),
  };

  sensDiv.innerHTML =
    "GENERAL: " + sens.general + "<br>" +
    "PUNTO ROJO: " + sens.redDot + "<br>" +
    "MIRA X2: " + sens.x2 + "<br>" +
    "MIRA X4: " + sens.x4 + "<br>" +
    "FRANCOTIRADOR: " + sens.sniper + "<br>" +
    "CAMARA 360: " + sens.freeLook;

  let precision = Math.floor((sens.general + sens.redDot + sens.freeLook) / 5);
  if (precision < 99) precision = 99;
  if (precision > 100) precision = 100;

  headshotDiv.innerHTML = "🎯 HEADSHOT: " + precision + "%";

});

/* FONDO ANIMADO TIPO LÍNEAS */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lines = [];

for (let i = 0; i < 30; i++) {
  lines.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    length: Math.random() * 200,
    angle: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.02 + 0.01
  });
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.2)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = "#a855f7";
  ctx.lineWidth = 2;
  ctx.shadowBlur = 20;
  ctx.shadowColor = "#a855f7";

  lines.forEach(l => {
    ctx.beginPath();
    ctx.moveTo(l.x, l.y);

    let x2 = l.x + Math.cos(l.angle) * l.length;
    let y2 = l.y + Math.sin(l.angle) * l.length;

    ctx.lineTo(x2, y2);
    ctx.stroke();

    l.angle += l.speed;
    l.x += Math.cos(l.angle) * 0.5;
    l.y += Math.sin(l.angle) * 0.5;

    if (l.x > canvas.width || l.y > canvas.height || l.x < 0 || l.y < 0) {
      l.x = Math.random() * canvas.width;
      l.y = Math.random() * canvas.height;
    }
  });

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
