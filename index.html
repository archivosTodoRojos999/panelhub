    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  h2 {

    margin-bottom: 20px;
    color: #fff;
  }
  label {
    display: block;
    margin-top: 15px;
    font-weight: bold;
  }
  input[type=range], input[type=number] {
    width: 100%;
    margin-top: 8px;

    color: #000;
    border: none;
    padding: 8px;
    border-radius: 4px;
  }
  .resultado {
    margin-top: 20px;
    font-size: 1.2em;
    text-align: center;
    background-color: rgba(255, 255, 255, 0.2); /* Fondo semi-transparente */
    padding: 10px;
    border-radius: 6px;
  }

  /* Estilos responsivos para dispositivos móviles */
  @media (max-width: 600px) {
    .container {
      max-width: 90%;
    }
  }

  /* Estilos responsivos para tabletas */
  @media (min-width: 601px) and (max-width: 1024px) {
    .container {
      max-width: 70%;
    }
    h2 {
      font-size: 2em;
    }
  }
</style>
</head>
