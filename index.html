<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SALITA SENSI GENERATOR</title>

<style>
body {
  background: black;
  color: #00ff00;
  font-family: monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  border: 1px solid #purple;
  padding: 20px;
  width: 350px;
  box-shadow: 0 0 15px #purple;
}

/* LOGO */
.logo-container {
  display: flex;
  justify-content: center;
  margin-bottom: 15px;
}

.logo {
  width: 220px;
  filter: drop-shadow(0 0 10px purple) drop-shadow(0 0 25px violet);
}

/* INPUTS */
input, button {
  width: 100%;
  margin-top: 10px;
  padding: 8px;
  background: black;
  color: #00ff00;
  border: 1px solid #00ff00;
}

button:hover {
  background: #00ff00;
  color: black;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-size: 14px;
}

.headshot {
  margin-top: 15px;
  border: 1px solid #00ff00;
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<div class="box">

  <!-- LOGO SALITA -->
  <div class="logo-container">
    <img class="logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAA..." alt="SALITA LOGO">
  </div>

  <h2> SENSI PRO MAX DE SALITA</h2>

  <input id="device" placeholder="Ej: Samsung A51, iPhone 11">
  <button onclick="generate()">GENERAR SENSI</button>

  <div id="error" style="color:red"></div>
  <div id="result" class="result"></div>
  <div id="headshot" class="headshot"></div>

</div>

<script>
function generate() {
  const device = document.getElementById("device").value.trim();
  const error = document.getElementById("error");
  const result = document.getElementById("result");
  const headshotBox = document.getElementById("headshot");

  if (!device) {
    error.innerText = "Escribe tu dispositivo";
    result.innerHTML = "";
    headshotBox.innerHTML = "";
    return;
  }

  error.innerText = "";

  let hash = 0;
  for (let i = 0; i < device.length; i++) {
    hash = device.charCodeAt(i) + ((hash << 5) - hash);
  }

  const base = Math.abs(hash);

  function calc(min, max, factor) {
    let value = min + (base % factor);
    value = Math.max(min, Math.min(value, max));
    return value;
  }

  const sens = {
    general: calc(120, 200, 80),
    redDot: calc(90, 180, 70),
    x2: calc(80, 170, 60),
    x4: calc(70, 160, 50),
    sniper: calc(60, 150, 40),
    freeLook: calc(100, 200, 100)
  };

  result.innerHTML = `
    GENERAL: ${sens.general}<br>
    PUNTO ROJO: ${sens.redDot}<br>
    MIRA X2: ${sens.x2}<br>
    MIRA X4: ${sens.x4}<br>
    FRANCOTIRADOR: ${sens.sniper}<br>
    CAMARA 360: ${sens.freeLook}
  `;

  let precision = Math.floor((sens.general + sens.redDot + sens.freeLook) / 5);
  if (precision < 100) precision = 100;
  if (precision > 100) precision = 100;

  headshotBox.innerHTML = `🎯 HEADSHOT PRECISION: ${precision}%`;
}
</script>

</body>
</html>
