<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IA con Voz y Texto</title>
</head>
<body>
    <h1>Escribe un mensaje</h1>
    <input type="text" id="userInput" placeholder="Escribe aquí tu mensaje">
    <button onclick="hablar()">Enviar</button>
    <p id="respuesta"></p>

    <script>
        function hablar() {
            const texto = document.getElementById('userInput').value;
            const respuesta = "Tu mensaje fue: " + texto;
            document.getElementById('respuesta').innerText = respuesta;

            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(respuesta);
            synth.speak(utterance);
        }
    </script>
</body>
</html>
