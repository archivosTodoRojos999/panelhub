<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Esquiva el Tráfico</title>

<style>
body{
margin:0;
background:#111;
overflow:hidden;
font-family:Arial;
text-align:center;
color:white;
}

canvas{
display:block;
margin:auto;
background:#555;
}
</style>
</head>

<body>

<h2>🚗 Esquiva el Tráfico</h2>
<p>⬅️➡️ mover | ⬆️ acelerar</p>

<canvas id="game" width="400" height="600"></canvas>

<audio id="engine" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c2f8b08a3.mp3">
</audio>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

const engine = document.getElementById("engine")

let roadOffset = 0

let playerImg = new Image()
playerImg.src = "https://i.imgur.com/7Q6YJQK.png"

let enemyImg = new Image()
enemyImg.src = "https://i.imgur.com/3WbZQKQ.png"

let player = {
x:170,
y:480,
w:60,
h:110,
speed:7
}

let cars = []

let gameSpeed = 5
let score = 0

let keys = {}

document.addEventListener("keydown",e=>keys[e.key]=true)
document.addEventListener("keyup",e=>keys[e.key]=false)

function spawnCar(){

let lane = Math.floor(Math.random()*3)

let x = 70 + lane*110

cars.push({
x:x,
y:-120,
w:60,
h:110
})

}

setInterval(spawnCar,1200)

function update(){

if(keys["ArrowLeft"]) player.x -= player.speed
if(keys["ArrowRight"]) player.x += player.speed

if(keys["ArrowUp"]){

gameSpeed += 0.03
engine.play().catch(()=>{})

}else{

engine.pause()

}

if(player.x < 40) player.x = 40
if(player.x > 300) player.x = 300

roadOffset += gameSpeed

cars.forEach(car=>{

car.y += gameSpeed

if(
player.x < car.x + car.w &&
player.x + player.w > car.x &&
player.y < car.y + car.h &&
player.y + player.h > car.y
){
alert("💥 Chocaste! Puntaje: "+score)
location.reload()
}

})

cars = cars.filter(car=>car.y < 700)

score++

}

function drawRoad(){

ctx.fillStyle="#2b2b2b"
ctx.fillRect(0,0,400,600)

ctx.strokeStyle="white"
ctx.lineWidth=6

for(let i=-40;i<600;i+=80){

ctx.beginPath()
ctx.moveTo(200,i + (roadOffset % 80))
ctx.lineTo(200,i+40 + (roadOffset % 80))
ctx.stroke()

}

}

function draw(){

ctx.clearRect(0,0,400,600)

drawRoad()

ctx.drawImage(playerImg,player.x,player.y,player.w,player.h)

cars.forEach(car=>{
ctx.drawImage(enemyImg,car.x,car.y,car.w,car.h)
})

ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.fillText("Puntos: "+score,10,25)
ctx.fillText("Velocidad: "+gameSpeed.toFixed(1),10,50)

}

function loop(){

update()
draw()
requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
